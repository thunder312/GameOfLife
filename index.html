<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway's Game of Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Conway's Game of Life</h1>

    <div id="controls">
      <button id="btn-lang">🌐 EN</button>
      <button id="btn-info">? Regeln</button>
      <button id="btn-start">▶ Start</button>
      <button id="btn-step">⏭ Schritt</button>
      <button id="btn-clear">🗑 Leeren</button>
      <button id="btn-random">🎲 Zufall</button>
      <label>
        <span id="lbl-density">Dichte:</span>
        <input type="range" id="density" min="1" max="100" value="25">
        <span id="density-label">25%</span>
      </label>
      <label>
        <span id="lbl-speed">Geschwindigkeit:</span>
        <input type="range" id="speed" min="1" max="30" value="10">
        <span id="speed-label">10 FPS</span>
      </label>
      <label id="label-maxgen">
        <span id="lbl-maxgen">Max. Gen.:</span>
        <input type="checkbox" id="limit-enabled">
        <input type="number" id="max-gen" min="1" value="100" disabled>
      </label>
      <span id="generation">Generation: 0</span>
    </div>

    <div id="structures">
      <span id="structures-label">Strukturen:</span>
      <button id="btn-coloring">Färbung: AN</button>
      <button class="btn-structure" data-structure="blinker" style="--sc:#ff6b6b">Blinker</button>
      <button class="btn-structure" data-structure="glider"  style="--sc:#c084fc">Glider</button>
      <button class="btn-structure" data-structure="lwss"    style="--sc:#38bdf8">Spaceship</button>
      <button class="btn-structure" data-structure="pulsar"  style="--sc:#fb923c">Pulsar</button>
      <button class="btn-structure" data-structure="gun"     style="--sc:#fde047">Glider Gun</button>
    </div>

    <div id="stats">
      <span id="stats-label">Protokoll:</span>
      <span id="stat-1" style="color:#ff6b6b">Blinker: 0</span>
      <span id="stat-2" style="color:#c084fc">Glider: 0</span>
      <span id="stat-3" style="color:#38bdf8">Spaceship: 0</span>
      <span id="stat-4" style="color:#fb923c">Pulsar: 0</span>
      <button id="btn-reset-counts">↺ Reset</button>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>
    <p id="hint">Klicke auf das Gitter, um Zellen zu setzen oder zu löschen. Struktur auswählen → ins Grid klicken zum Platzieren (ESC zum Abbrechen).</p>
  </div>

  <div id="modal-overlay">
    <div id="modal">
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
